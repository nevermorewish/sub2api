services:
  sub2api:
    image: crpi-dzjyl2rfnlfugj1m.cn-shanghai.personal.cr.aliyuncs.com/frogclaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      AUTO_SETUP: "true"

      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      SERVER_MODE: release
      RUN_MODE: standard
      TZ: Asia/Shanghai

      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: sub2api
      DATABASE_PASSWORD: 326c6f470cd9bdba1e593eaef158cb4d797118a6ee2f08dcbd671e8afe300b24
      DATABASE_DBNAME: sub2api
      DATABASE_SSLMODE: disable
      DATABASE_MAX_OPEN_CONNS: "50"
      DATABASE_MAX_IDLE_CONNS: "10"
      DATABASE_CONN_MAX_LIFETIME_MINUTES: "30"
      DATABASE_CONN_MAX_IDLE_TIME_MINUTES: "5"

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_POOL_SIZE: "1024"
      REDIS_MIN_IDLE_CONNS: "10"
      REDIS_ENABLE_TLS: "false"

      ADMIN_EMAIL: admin@sub2api.local
      ADMIN_PASSWORD: ""

      JWT_SECRET: 9ee046d2f646605ec7bd3add01ef2512fec58b87c0dab899863bc83e2f27c78c
      JWT_EXPIRE_HOUR: "24"
      TOTP_ENCRYPTION_KEY: 949bba020f543de9181f873f5cd5d83f7b2d7261683b29d4da9a0e3efe863c21

      GEMINI_OAUTH_CLIENT_ID: ""
      GEMINI_OAUTH_CLIENT_SECRET: ""
      GEMINI_OAUTH_SCOPES: ""
      GEMINI_QUOTA_POLICY: ""
      GEMINI_CLI_OAUTH_CLIENT_SECRET: ""
      ANTIGRAVITY_OAUTH_CLIENT_SECRET: ""

      SECURITY_URL_ALLOWLIST_ENABLED: "false"
      SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: "false"
      SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: "false"
      SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS: ""

      UPDATE_PROXY_URL: ""

      GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT: "900"
      GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL: "10"
      GATEWAY_IMAGE_CONCURRENCY_ENABLED: "false"
      GATEWAY_IMAGE_CONCURRENCY_MAX_CONCURRENT_REQUESTS: "0"
      GATEWAY_IMAGE_CONCURRENCY_OVERFLOW_MODE: reject
      GATEWAY_IMAGE_CONCURRENCY_WAIT_TIMEOUT_SECONDS: "30"
      GATEWAY_IMAGE_CONCURRENCY_MAX_WAITING_REQUESTS: "100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres:
    image: docker.m.daocloud.io/library/postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: sub2api
      POSTGRES_PASSWORD: 326c6f470cd9bdba1e593eaef158cb4d797118a6ee2f08dcbd671e8afe300b24
      POSTGRES_DB: sub2api
      PGDATA: /var/lib/postgresql/data
      TZ: Asia/Shanghai
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./redis_data:/data
    command: >
      redis-server
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    environment:
      TZ: Asia/Shanghai
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-network:
    driver: bridge
